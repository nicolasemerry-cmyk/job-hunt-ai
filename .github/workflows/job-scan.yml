name: Job Scan

on:
  schedule:
    # Runs at 8am UTC every Monday and Thursday
    - cron: '0 8 * * 1'
    - cron: '0 8 * * 4'
  workflow_dispatch:  # Lets you trigger a manual scan from GitHub's website

permissions:
  contents: write  # Needed to commit last_seen.json back to the repo

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install chromium --with-deps

      - name: Run job scanner
        run: python job_scanner.py

      - name: Send email report
        continue-on-error: true
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python send_report.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_seen.json new_jobs.json job_report.html
          git diff --staged --quiet || git commit -m "Job scan $(date -u '+%Y-%m-%d')"
          git push
